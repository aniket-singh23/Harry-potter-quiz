<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Hat Quiz</title>
    <style>
        :root {
            --bg: #0b0e16;
            --bg-soft: #121826;
            --panel: rgba(16, 20, 31, 0.74);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #f6f2ea;
            --muted: rgba(246, 242, 234, 0.78);
            --gold: #d9b15f;
            --gold-2: #f0d68a;
            --purple: #5961ff;
            --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.06), transparent 16%),
                radial-gradient(circle at 85% 24%, rgba(255, 255, 255, 0.05), transparent 18%),
                radial-gradient(circle at 50% 55%, rgba(255, 210, 120, 0.08), transparent 22%),
                linear-gradient(180deg, #0a0d15 0%, var(--bg) 50%, #0a0d15 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255, 255, 255, 0.18) 1px, transparent 1.6px),
                radial-gradient(circle, rgba(255, 255, 255, 0.08) 1px, transparent 1.6px);
            background-size: 120px 120px, 190px 190px;
            background-position: 0 0, 50px 80px;
            opacity: 0.22;
            pointer-events: none;
        }

        .page {
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .wrap {
            width: min(1540px, calc(100% - 48px));
            margin: 0 auto;
            padding: 28px 0 38px;
        }

        .hero {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.02fr 0.98fr;
            align-items: center;
            gap: 42px;
            padding: 0 10px 30px;
        }

        .art,
        .copy {
            position: relative;
        }

        .art {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 620px;
        }

        .art::before {
            content: "";
            position: absolute;
            inset: 10% 14% 8% 10%;
            background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08) 34%, rgba(255, 255, 255, 0.02) 58%, transparent 72%);
            filter: blur(10px);
            border-radius: 48% 52% 45% 55% / 50% 46% 54% 50%;
            opacity: 0.8;
        }

        .art-card {
            position: relative;
            width: min(100%, 700px);
            display: grid;
            place-items: center;
            min-height: 560px;
        }

        .art-card img {
            width: min(100%, 560px);
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 24px 38px rgba(0, 0, 0, 0.65));
            transform: translateY(6px) scale(1.02);
        }

        .shield {
            position: absolute;
            width: 120px;
            height: 120px;
            display: grid;
            place-items: center;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.2);
        }

        .shield svg {
            width: 112px;
            height: 112px;
            display: block;
            opacity: 0.94;
        }

        .shield.one { top: 112px; left: 72px; transform: rotate(-8deg); }
        .shield.two { top: 86px; right: 118px; transform: rotate(10deg); }
        .shield.three { bottom: 132px; left: 24px; transform: rotate(-12deg); }
        .shield.four { bottom: 120px; right: 52px; transform: rotate(8deg); }

        .copy {
            display: grid;
            justify-items: center;
            text-align: center;
            gap: 18px;
            padding: 22px 12px;
        }

        .logo {
            width: 220px;
            max-width: 70%;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.45));
        }

        .eyebrow {
            margin-top: 6px;
            font-size: 0.96rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold-2);
            font-weight: 800;
        }

        h1 {
            font-family: "Times New Roman", Georgia, serif;
            font-size: clamp(3.2rem, 5.1vw, 5.9rem);
            line-height: 0.98;
            letter-spacing: -0.02em;
            text-wrap: balance;
            max-width: 860px;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        .lead {
            max-width: 680px;
            font-size: 1.08rem;
            line-height: 1.65;
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 14px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 352px;
            padding: 18px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }

        .button.primary {
            color: #fff;
            background: linear-gradient(135deg, #5e66ff 0%, #4f57ff 100%);
            box-shadow: 0 16px 30px rgba(79, 87, 255, 0.35);
        }

        .button.secondary {
            min-width: 168px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.52);
            font-size: 0.92rem;
        }

        @media (max-width: 1180px) {
            .hero {
                grid-template-columns: 1fr;
                gap: 18px;
                min-height: auto;
            }
        }

        @media (max-width: 760px) {
            .art {
                min-height: 380px;
            }

            .art-card {
                min-height: 350px;
            }

            .art-card img {
                width: min(100%, 340px);
            }

            .shield {
                width: 66px;
                height: 66px;
                border-radius: 16px;
            }

            .shield svg {
                width: 60px;
                height: 60px;
            }

            .shield.one { top: 18px; left: 0; }
            .shield.two { top: 8px; right: 0; }
            .shield.three { bottom: 22px; left: 0; }
            .shield.four { bottom: 12px; right: 0; }

            h1 {
                font-size: clamp(2.6rem, 11vw, 4.2rem);
            }

            .lead {
                font-size: 1rem;
            }

            .button {
                width: 100%;
                min-width: 0;
            }

            .secondary {
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="wrap">
            <section class="hero">
                <div class="art" aria-hidden="true">
                    <div class="art-card">
                        <div class="shield one">
                            <svg viewBox="0 0 120 120" aria-hidden="true">
                                <path d="M60 10 L98 22 V54 C98 78 81 99 60 109 C39 99 22 78 22 54 V22 Z" fill="rgba(40, 96, 196, 0.9)"/>
                                <path d="M60 21 C79 29 86 42 85 58 C84 72 75 83 60 91 C45 83 36 72 35 58 C34 42 41 29 60 21 Z" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3"/>
                            </svg>
                        </div>
                        <div class="shield two">
                            <svg viewBox="0 0 120 120" aria-hidden="true">
                                <path d="M60 10 L98 22 V54 C98 78 81 99 60 109 C39 99 22 78 22 54 V22 Z" fill="rgba(235, 175, 66, 0.92)"/>
                                <path d="M60 23 C75 31 83 42 82 57 C81 73 74 82 60 89 C46 82 39 73 38 57 C37 42 45 31 60 23 Z" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
                            </svg>
                        </div>
                        <div class="shield three">
                            <svg viewBox="0 0 120 120" aria-hidden="true">
                                <path d="M60 10 L98 22 V54 C98 78 81 99 60 109 C39 99 22 78 22 54 V22 Z" fill="rgba(240, 94, 66, 0.9)"/>
                                <path d="M60 20 C76 30 84 42 84 56 C84 72 76 82 60 90 C44 82 36 72 36 56 C36 42 44 30 60 20 Z" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
                            </svg>
                        </div>
                        <div class="shield four">
                            <svg viewBox="0 0 120 120" aria-hidden="true">
                                <path d="M60 10 L98 22 V54 C98 78 81 99 60 109 C39 99 22 78 22 54 V22 Z" fill="rgba(36, 145, 110, 0.92)"/>
                                <path d="M60 22 C76 31 83 43 82 57 C81 71 74 82 60 89 C46 82 39 71 38 57 C37 43 44 31 60 22 Z" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
                            </svg>
                        </div>
                        <img src="/static/Brand.png" alt="Sorting Hat illustration">
                    </div>
                </div>

                <div class="copy">
                    <img class="logo" src="https://www.harrypotter.com/_next/static/images/logo-gold-600-7a7e89b6db1ffeaab025f2091d21b645.png" alt="Harry Potter logo">
                    <div class="eyebrow">Sorting Ceremony</div>
                    <h1>Discover your Hogwarts House</h1>
                    <p class="lead">
                        Don the Sorting Hat to be placed into your rightful Hogwarts house. The Sorting Hat's decision is final.
                    </p>
                    <div class="actions">
                        <a class="button primary" href="/quiz">Start the sorting ceremony</a>
                        <a class="button secondary" href="/about">About us</a>
                    </div>
                    <p class="footer-note" id="contact">A Hogwarts-inspired landing page for the Sorting Hat quiz.</p>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
